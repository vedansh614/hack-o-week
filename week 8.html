<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Modern Image Gallery</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #07080c;
            --accent-glow: rgba(52, 152, 219, 0.12);
            --card-bg: #11141d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --interactive: #58a6ff;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--accent-glow) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--accent-glow) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* --- Navbar --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        nav.scrolled {
            padding: 15px 40px;
            background: rgba(7, 8, 12, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Header --- */
        header {
            text-align: center;
            padding: 120px 20px 40px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        /* --- Filters --- */
        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .filter-btn:hover {
            border-color: var(--interactive);
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--interactive);
            color: white;
            border-color: var(--interactive);
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3);
        }

        /* --- Gallery Grid --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px 100px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--card-bg);
            aspect-ratio: 1/1;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(30px);
        }

        .gallery-item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(88, 166, 255, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            opacity: 0;
            transition: var(--transition);
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .overlay span {
            font-size: 0.8rem;
            color: var(--interactive);
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: translateY(10px);
            transition: var(--transition);
            transition-delay: 0.05s;
        }

        .gallery-item:hover h3, 
        .gallery-item:hover span {
            transform: translateY(0);
        }

        /* --- Lightbox --- */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(5, 6, 10, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            opacity: 0;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .img-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            border-radius: 12px;
            cursor: zoom-in;
        }

        #lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.4s var(--transition);
            user-select: none;
        }

        .img-wrapper.zoomed {
            cursor: zoom-out;
        }

        .img-wrapper.zoomed #lightbox-img {
            transform: scale(1.5);
        }

        .lightbox-info {
            position: absolute;
            bottom: 40px;
            text-align: center;
        }

        #lightbox-caption {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        #image-counter {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* --- Lightbox Controls --- */
        .lb-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            position: absolute;
            z-index: 2010;
        }

        .lb-btn:hover {
            background: var(--interactive);
            border-color: var(--interactive);
            transform: scale(1.1);
        }

        .close-btn { top: 30px; right: 30px; }
        .prev-btn { left: 30px; top: 50%; transform: translateY(-50%); }
        .next-btn { right: 30px; top: 50%; transform: translateY(-50%); }

        @media (max-width: 768px) {
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
            .lb-btn { width: 40px; height: 40px; }
            nav { padding: 15px 20px; }
        }

        /* Loader */
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--interactive);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            position: absolute;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo">
            
        </div>
        <div class="nav-links">
            <!-- Space for future links -->
        </div>
    </nav>

    <header>
        <h1>Visual Narrative</h1>
        <p>A collection of moments captured across the globe, focusing on the interplay of light and texture in the natural world.</p>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Shots</button>
            <button class="filter-btn" data-filter="mountains">Mountains</button>
            <button class="filter-btn" data-filter="forest">Forest</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
        </div>
    </header>

    <main class="container">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Injected via JS -->
        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox">
        <div class="loader" id="loader"></div>
        <div class="lightbox-content">
            <button class="lb-btn close-btn" id="closeBtn">
                <i data-lucide="x"></i>
            </button>
            
            <button class="lb-btn prev-btn" id="prevBtn">
                <i data-lucide="chevron-left"></i>
            </button>
            
            <div class="img-wrapper" id="imgWrapper">
                <img src="" alt="Full view" id="lightbox-img">
            </div>

            <div class="lightbox-info">
                <h3 id="lightbox-caption"></h3>
                <p id="image-counter"></p>
            </div>
            
            <button class="lb-btn next-btn" id="nextBtn">
                <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        const images = [
            { url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1200&q=80', title: 'Misty Mountains', category: 'mountains' },
            { url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80', title: 'Forest Sunlight', category: 'forest' },
            { url: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=1200&q=80', title: 'Verdent Hills', category: 'nature' },
            { url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80', title: 'Alpine Peaks', category: 'mountains' },
            { url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1200&q=80', title: 'Silent Woods', category: 'forest' },
            { url: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80', title: 'Valley River', category: 'nature' },
            { url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1200&q=80', title: 'Canyon Adventure', category: 'nature' },
            { url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1200&q=80', title: 'Golden Fields', category: 'nature' }
        ];

        let currentIndex = 0;
        let activeFilter = 'all';

        const galleryGrid = document.getElementById('galleryGrid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const imgWrapper = document.getElementById('imgWrapper');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const imageCounter = document.getElementById('image-counter');
        const navbar = document.getElementById('navbar');
        const loader = document.getElementById('loader');

        // Scroll listener for Navbar
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        // Initialize Gallery
        function renderGallery() {
            galleryGrid.innerHTML = '';
            const filtered = images.filter(img => activeFilter === 'all' || img.category === activeFilter);
            
            filtered.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                // Use a different index reference for the lightbox when filtered
                const originalIndex = images.indexOf(img);
                
                item.innerHTML = `
                    <img src="${img.url}" alt="${img.title}" loading="lazy">
                    <div class="overlay">
                        <span>${img.category}</span>
                        <h3>${img.title}</h3>
                    </div>
                `;
                item.addEventListener('click', () => openLightbox(originalIndex));
                galleryGrid.appendChild(item);
                
                // Staggered appearance
                setTimeout(() => item.classList.add('show'), index * 100);
            });
            lucide.createIcons();
        }

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                renderGallery();
            });
        });

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            imgWrapper.classList.remove('zoomed');
        }

        function updateLightbox() {
            const data = images[currentIndex];
            loader.style.display = 'block';
            lightboxImg.style.opacity = '0';
            
            lightboxCaption.textContent = data.title;
            imageCounter.textContent = `${currentIndex + 1} / ${images.length}`;
            
            const highRes = new Image();
            highRes.src = data.url;
            highRes.onload = () => {
                lightboxImg.src = highRes.src;
                lightboxImg.style.opacity = '1';
                loader.style.display = 'none';
            };
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Controls
        document.getElementById('closeBtn').addEventListener('click', closeLightbox);
        document.getElementById('nextBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % images.length;
            updateLightbox();
        });
        document.getElementById('prevBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateLightbox();
        });

        // Zoom toggle
        imgWrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            imgWrapper.classList.toggle('zoomed');
        });

        // Global Listeners
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.classList.contains('lightbox-content')) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
            if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
        });

        // Start
        renderGallery();
    </script>
</body>
</html>
