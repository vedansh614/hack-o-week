<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Manager (Undo/Redo)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        color: #fff;
    }

    .container {
        max-width: 520px;
        margin: 40px auto;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(15px);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        animation: fadeIn 0.6s ease;
    }

    h2 {
        text-align: center;
        font-weight: 600;
        letter-spacing: 1px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 12px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.15);
        color: white;
    }

    input::placeholder { color: #ddd; }

    .btn-group {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    button:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .add { background: linear-gradient(135deg, #00c9ff, #92fe9d); }
    .undo { background: linear-gradient(135deg, #ff6a6a, #ff3c3c); }
    .redo { background: linear-gradient(135deg, #4facfe, #00f2fe); }

    .task {
        background: rgba(255,255,255,0.15);
        padding: 14px;
        margin-top: 10px;
        border-radius: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: slideUp 0.3s ease;
    }

    .task span {
        font-size: 14px;
        opacity: 0.8;
    }

    .badge {
        background: #00f2fe;
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 11px;
        color: black;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="container">
    <h2>✨ Smart Task Manager</h2>

    <input type="text" id="taskInput" placeholder="Type your task...">

    <div class="btn-group">
        <button class="add" onclick="addTask()">➕ Add</button>
        <button class="undo" onclick="undoAction()">↩️ Undo</button>
        <button class="redo" onclick="redoAction()">↪️ Redo</button>
    </div>

    <div id="output"></div>
</div>

<script>
let tasks = [];
let undoStack = [];
let redoStack = [];

function addTask() {
    let task = document.getElementById("taskInput").value;

    if (!task) {
        alert("Enter a task");
        return;
    }

    tasks.push(task);
    undoStack.push({ type: "add", value: task });
    redoStack = [];

    document.getElementById("taskInput").value = "";
    displayTasks();
}

function undoAction() {
    if (undoStack.length === 0) {
        alert("Nothing to undo");
        return;
    }

    let action = undoStack.pop();

    if (action.type === "add") {
        tasks.pop();
    }

    redoStack.push(action);
    displayTasks();
}

function redoAction() {
    if (redoStack.length === 0) {
        alert("Nothing to redo");
        return;
    }

    let action = redoStack.pop();

    if (action.type === "add") {
        tasks.push(action.value);
    }

    undoStack.push(action);
    displayTasks();
}

function displayTasks() {
    let output = document.getElementById("output");
    output.innerHTML = "";

    if (tasks.length === 0) {
        output.innerHTML = "<p>No tasks yet 🚀</p>";
        return;
    }

    tasks.forEach((task, index) => {
        output.innerHTML += `
            <div class="task">
                <div>
                    <b>${index + 1}. ${task}</b><br>
                    <span>Task Active</span>
                </div>
                <div class="badge">LIVE</div>
            </div>
        `;
    });
}
</script>

</body>
</html>
