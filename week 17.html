<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATM Queue (Circular Queue)</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
  }
  .container{
    max-width:560px;
    margin:40px auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    padding:24px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
  }
  h2{text-align:center;margin-bottom:10px}
  input{
    width:100%;padding:12px;margin:8px 0;border:none;border-radius:12px;
    background:rgba(255,255,255,0.15);color:#fff;outline:none
  }
  input::placeholder{color:#ddd}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  button{
    padding:12px;border:none;border-radius:12px;font-weight:600;color:#fff;cursor:pointer;
    transition:0.25s
  }
  button:hover{transform:scale(1.05)}
  .enqueue{background:linear-gradient(135deg,#00c9ff,#92fe9d)}
  .dequeue{background:linear-gradient(135deg,#ff6a6a,#ff3c3c)}
  .show{background:linear-gradient(135deg,#4facfe,#00f2fe);grid-column:span 2}

  .queue-box{margin-top:15px}
  .slot{
    background:rgba(255,255,255,0.15);
    padding:12px;margin:6px 0;border-radius:12px;
    display:flex;justify-content:space-between;align-items:center
  }
  .tag{background:#00f2fe;color:#000;padding:4px 8px;border-radius:8px;font-size:12px}
  .info{margin-top:10px;font-size:14px;opacity:0.9}
</style>
</head>
<body>

<div class="container">
  <h2>🏦 ATM Queue (Circular)</h2>

  <input type="text" id="name" placeholder="Customer Name">

  <div class="btns">
    <button class="enqueue" onclick="enqueue()">➕ Enqueue</button>
    <button class="dequeue" onclick="dequeue()">➡️ Serve</button>
    <button class="show" onclick="display()">📄 Show Queue</button>
  </div>

  <div class="info" id="status"></div>
  <div id="output" class="queue-box"></div>
</div>

<script>
const SIZE = 5;
let queue = new Array(SIZE);
let front = -1, rear = -1;

function isFull(){
  return (front === 0 && rear === SIZE-1) || (rear === (front-1+SIZE)%SIZE);
}

function isEmpty(){
  return front === -1;
}

function enqueue(){
  let name = document.getElementById('name').value;
  if(!name){alert('Enter name');return;}

  if(isFull()){
    alert('Queue Full (Peak Hour!)');
    return;
  }

  if(front === -1){front = rear = 0;}
  else if(rear === SIZE-1 && front !== 0){rear = 0;}
  else{rear++;}

  queue[rear] = name;
  document.getElementById('name').value='';
  display();
}

function dequeue(){
  if(isEmpty()){
    alert('Queue Empty');
    return;
  }

  let served = queue[front];
  alert('Serving: ' + served);

  if(front === rear){front = rear = -1;}
  else if(front === SIZE-1){front = 0;}
  else{front++;}

  display();
}

function display(){
  let out = document.getElementById('output');
  let status = document.getElementById('status');
  out.innerHTML='';

  if(isEmpty()){
    out.innerHTML='<p>No customers</p>';
    status.innerHTML='Status: EMPTY';
    return;
  }

  let i = front;
  let pos = 1;
  while(true){
    let tag = (i === front) ? 'Next' : 'Waiting';
    out.innerHTML += `<div class="slot">
      <span>${pos}. ${queue[i]}</span>
      <span class="tag">${tag}</span>
    </div>`;

    if(i === rear) break;
    i = (i + 1) % SIZE;
    pos++;
  }

  status.innerHTML = `Front: ${front} | Rear: ${rear} | Capacity: ${SIZE}`;
}
</script>

</body>
</html>
