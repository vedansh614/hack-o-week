<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart (Linked List)</title>
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .container {
        max-width: 520px;
        margin: 40px auto;
        background: #fff;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .add { background: #28a745; }
    .remove { background: #dc3545; }
    .show { background: #007bff; }

    .item {
        background: #f1f3f5;
        padding: 12px;
        margin-top: 10px;
        border-radius: 12px;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px);} 
        to { opacity: 1; transform: translateY(0);} 
    }
</style>
</head>
<body>

<div class="container">
    <h2>🛒 Shopping Cart</h2>

    <input type="number" id="id" placeholder="Item ID">
    <input type="text" id="name" placeholder="Item Name">

    <select id="position">
        <option value="head">Insert at Head</option>
        <option value="tail">Insert at Tail</option>
    </select>

    <button class="add" onclick="addItem()">➕ Add Item</button>

    <input type="number" id="removeId" placeholder="Remove by ID">
    <button class="remove" onclick="removeItem()">❌ Remove Item</button>

    <button class="show" onclick="displayCart()">📄 Show Cart</button>

    <div id="output"></div>
</div>

<script>
// Linked List Node
class Node {
    constructor(id, name) {
        this.id = id;
        this.name = name;
        this.next = null;
    }
}

let head = null;

function addItem() {
    let id = document.getElementById("id").value;
    let name = document.getElementById("name").value;
    let position = document.getElementById("position").value;

    if (!id || !name) {
        alert("Fill all fields!");
        return;
    }

    let newNode = new Node(id, name);

    if (position === "head") {
        newNode.next = head;
        head = newNode;
    } else {
        if (head === null) {
            head = newNode;
        } else {
            let temp = head;
            while (temp.next !== null) {
                temp = temp.next;
            }
            temp.next = newNode;
        }
    }

    document.getElementById("id").value = "";
    document.getElementById("name").value = "";
    displayCart();
}

function removeItem() {
    let id = document.getElementById("removeId").value;

    if (!head) {
        alert("Cart is empty");
        return;
    }

    if (head.id == id) {
        head = head.next;
        displayCart();
        return;
    }

    let temp = head;

    while (temp.next !== null && temp.next.id != id) {
        temp = temp.next;
    }

    if (temp.next === null) {
        alert("Item not found");
    } else {
        temp.next = temp.next.next;
        displayCart();
    }
}

function displayCart() {
    let output = document.getElementById("output");
    output.innerHTML = "";

    if (!head) {
        output.innerHTML = "<p>Cart is empty</p>";
        return;
    }

    let temp = head;
    let i = 1;

    while (temp !== null) {
        output.innerHTML += `
            <div class="item">
                <b>${i}. ${temp.name}</b><br>
                ID: ${temp.id}
            </div>
        `;
        temp = temp.next;
        i++;
    }
}
</script>

</body>
</html>
