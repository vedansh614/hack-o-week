<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Printer Queue (FIFO)</title>
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    }

    .container {
        max-width: 520px;
        margin: 40px auto;
        background: #fff;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 { text-align: center; }

    input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover { transform: scale(1.05); }

    .enqueue { background: #28a745; }
    .dequeue { background: #dc3545; }
    .show { background: #007bff; }

    .job {
        background: #f1f3f5;
        padding: 12px;
        margin-top: 10px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: fadeIn 0.3s ease;
    }

    .tag {
        background: #007bff;
        color: white;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 12px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px);} 
        to { opacity: 1; transform: translateY(0);} 
    }
</style>
</head>
<body>

<div class="container">
    <h2>🖨️ Printer Queue</h2>

    <input type="text" id="jobName" placeholder="Enter Print Job Name">

    <button class="enqueue" onclick="addJob()">➕ Add Job</button>
    <button class="dequeue" onclick="processJob()">🖨️ Process Job</button>
    <button class="show" onclick="displayQueue()">📄 Show Queue</button>

    <div id="output"></div>
</div>

<script>
let queue = [];

function addJob() {
    let job = document.getElementById("jobName").value;

    if (!job) {
        alert("Enter job name");
        return;
    }

    queue.push(job); // enqueue
    document.getElementById("jobName").value = "";
    displayQueue();
}

function processJob() {
    if (queue.length === 0) {
        alert("No jobs in queue");
        return;
    }

    let done = queue.shift(); // dequeue FIFO
    alert("Printing: " + done);
    displayQueue();
}

function displayQueue() {
    let output = document.getElementById("output");
    output.innerHTML = "";

    if (queue.length === 0) {
        output.innerHTML = "<p>No pending jobs</p>";
        return;
    }

    queue.forEach((job, index) => {
        let tag = index === 0 ? "Now Printing" : "Waiting";
        output.innerHTML += `
            <div class="job">
                <span>${index + 1}. ${job}</span>
                <span class="tag">${tag}</span>
            </div>
        `;
    });
}
</script>

</body>
</html>
