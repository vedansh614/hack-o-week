<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Score Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff}
  .container{max-width:720px;margin:36px auto;background:rgba(255,255,255,.08);backdrop-filter:blur(14px);padding:22px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  h2{text-align:center;margin:0 0 10px}
  input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;outline:none}
  input::placeholder{color:#ddd}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  button{padding:12px;border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;transition:.25s}
  button:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 6px 18px rgba(0,0,0,.35)}
  .add{background:linear-gradient(135deg,#00c9ff,#92fe9d)}
  .remove{background:linear-gradient(135deg,#ff6a6a,#ff3c3c)}
  .clear{background:linear-gradient(135deg,#f7971e,#ffd200)}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
  .card{background:rgba(255,255,255,.15);padding:12px;border-radius:14px;text-align:center}
  .card b{font-size:18px}
  .list{margin-top:14px;max-height:280px;overflow:auto}
  .row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.12);padding:10px;border-radius:12px;margin-top:6px}
  .badge{background:#00f2fe;color:#000;border-radius:8px;padding:3px 8px;font-size:11px}
  .muted{opacity:.8;font-size:12px}
</style>
</head>
<body>

<div class="container">
  <h2>📊 Exam Score Tracker</h2>

  <input id="score" type="number" min="0" max="100" placeholder="Enter score (0–100)">

  <div class="grid">
    <button class="add" onclick="addScore()">➕ Add</button>
    <button class="remove" onclick="removeScore()">➖ Remove</button>
    <button class="clear" onclick="clearAll()">🧹 Clear</button>
  </div>

  <div class="stats">
    <div class="card"><div class="muted">Min</div><b id="min">-</b></div>
    <div class="card"><div class="muted">Max</div><b id="max">-</b></div>
    <div class="card"><div class="muted">Mode</div><b id="mode">-</b></div>
  </div>

  <div class="list" id="freqList"></div>
</div>

<script>
// Frequency array for scores 0..100
const MAX_SCORE = 100;
let freq = new Array(MAX_SCORE + 1).fill(0);
let totalCount = 0;

function validScore(v){
  return Number.isInteger(v) && v >= 0 && v <= MAX_SCORE;
}

function addScore(){
  const v = parseInt(document.getElementById('score').value);
  if(!validScore(v)){ alert('Enter integer 0–100'); return; }
  freq[v]++;
  totalCount++;
  document.getElementById('score').value='';
  update();
}

function removeScore(){
  const v = parseInt(document.getElementById('score').value);
  if(!validScore(v)){ alert('Enter integer 0–100'); return; }
  if(freq[v] === 0){ alert('Score not present'); return; }
  freq[v]--;
  totalCount--;
  document.getElementById('score').value='';
  update();
}

function clearAll(){
  freq.fill(0); totalCount = 0; update();
}

function computeMin(){
  for(let i=0;i<=MAX_SCORE;i++) if(freq[i] > 0) return i;
  return null;
}

function computeMax(){
  for(let i=MAX_SCORE;i>=0;i--) if(freq[i] > 0) return i;
  return null;
}

function computeMode(){
  let best = 0, mode = null;
  for(let i=0;i<=MAX_SCORE;i++){
    if(freq[i] > best){ best = freq[i]; mode = i; }
  }
  return mode;
}

function update(){
  const min = computeMin();
  const max = computeMax();
  const mode = computeMode();

  document.getElementById('min').textContent = (min === null ? '-' : min);
  document.getElementById('max').textContent = (max === null ? '-' : max);
  document.getElementById('mode').textContent = (mode === null ? '-' : mode);

  const list = document.getElementById('freqList');
  list.innerHTML = '';

  if(totalCount === 0){
    list.innerHTML = '<p>No scores yet</p>';
    return;
  }

  for(let i=0;i<=MAX_SCORE;i++){
    if(freq[i] > 0){
      list.innerHTML += `
        <div class=\"row\">
          <div><b>Score ${i}</b><div class=\"muted\">Count: ${freq[i]}</div></div>
          <span class=\"badge\">${Math.round((freq[i]/totalCount)*100)}%</span>
        </div>`;
    }
  }
}
</script>

</body>
</html>
